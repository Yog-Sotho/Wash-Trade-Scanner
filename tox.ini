[tox]
envlist = py310,py311,py312,flake8,mypy
skipsdist = true

[testenv]
deps =
    -rrequirements.txt
    -rrequirements-dev.txt
commands =
    pytest {posargs:tests/ -v --cov=core --cov-report=term-missing}

[testenv:flake8]
deps = flake8
commands = flake8 config core models scripts tests setup.py

[testenv:mypy]
deps =
    -rrequirements.txt
    -rrequirements-dev.txt
commands = mypy config core models scripts
