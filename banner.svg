<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">

  <!-- Background -->
  <rect width="1200" height="300" fill="#070A12"/>

  <!-- Subtle grid -->
  <g stroke="#111827" stroke-width="1">
    <path d="M0 60 H1200"/>
    <path d="M0 120 H1200"/>
    <path d="M0 180 H1200"/>
    <path d="M0 240 H1200"/>

    <path d="M200 0 V300"/>
    <path d="M400 0 V300"/>
    <path d="M600 0 V300"/>
    <path d="M800 0 V300"/>
    <path d="M1000 0 V300"/>
  </g>

  <!-- LEFT PANEL (TEXT) -->
  <text x="60" y="105"
        font-family="monospace"
        font-size="42"
        fill="#ffffff"
        font-weight="700">
    Wash Trade Scanner
  </text>

  <text x="60" y="145"
        font-family="monospace"
        font-size="18"
        fill="#9CA3AF">
    On-chain detection of artificial volume & coordinated trading
  </text>

  <text x="60" y="175"
        font-family="monospace"
        font-size="14"
        fill="#6B7280">
    Graph analytics • anomaly scoring • behavioral clustering
  </text>

  <!-- Accent bar -->
  <rect x="60" y="195" width="340" height="3" fill="#3B82F6"/>

  <!-- RIGHT PANEL (NETWORK GRAPH) -->

  <!-- Nodes -->
  <circle cx="820" cy="90" r="6" fill="#22D3EE"/>
  <circle cx="980" cy="110" r="6" fill="#22D3EE"/>
  <circle cx="1100" cy="190" r="6" fill="#22D3EE"/>
  <circle cx="960" cy="250" r="6" fill="#22D3EE"/>
  <circle cx="800" cy="220" r="6" fill="#22D3EE"/>
  <circle cx="900" cy="160" r="6" fill="#3B82F6"/>

  <!-- Normal edges -->
  <g stroke="#3B82F6" stroke-width="2" fill="none">
    <path d="M820 90 L980 110 L1100 190 L960 250 L800 220 Z"/>
    <path d="M900 160 L820 90"/>
    <path d="M900 160 L980 110"/>
    <path d="M900 160 L1100 190"/>
  </g>

  <!-- Suspicious wash loop (highlight) -->
  <path d="M1100 190 L820 90"
        stroke="#EF4444"
        stroke-width="3"
        fill="none"/>

  <!-- Label -->
  <text x="800" y="285"
        font-family="monospace"
        font-size="12"
        fill="#EF4444">
    anomaly: circular wash trading pattern detected
  </text>

</svg>
