<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">

  <!-- Background -->
  <rect width="1200" height="300" fill="#0b0f1a"/>

  <!-- Subtle grid -->
  <g stroke="#1f2937" stroke-width="1" opacity="0.6">
    <path d="M0 60 H1200"/>
    <path d="M0 120 H1200"/>
    <path d="M0 180 H1200"/>
    <path d="M0 240 H1200"/>

    <path d="M200 0 V300"/>
    <path d="M400 0 V300"/>
    <path d="M600 0 V300"/>
    <path d="M800 0 V300"/>
    <path d="M1000 0 V300"/>
  </g>

  <!-- Title -->
  <text x="70" y="120"
        fill="#ffffff"
        font-size="46"
        font-family="monospace"
        font-weight="700">
    Wash Trade Scanner
  </text>

  <!-- Subtitle -->
  <text x="70" y="160"
        fill="#9ca3af"
        font-size="18"
        font-family="monospace">
    Detect fake volume, wash trading & coordinated wallets
  </text>

  <text x="70" y="190"
        fill="#6b7280"
        font-size="14"
        font-family="monospace">
    Graph-based anomaly detection • market manipulation signals
  </text>

  <!-- Accent line -->
  <rect x="70" y="210" width="280" height="3" fill="#3b82f6"/>

  <!-- Simple network graph -->
  <g fill="#22d3ee">

    <circle cx="850" cy="90" r="5"/>
    <circle cx="1000" cy="130" r="5"/>
    <circle cx="1100" cy="210" r="5"/>
    <circle cx="950" cy="250" r="5"/>
    <circle cx="800" cy="200" r="5"/>

  </g>

  <g stroke="#3b82f6" stroke-width="2">
    <path d="M850 90 L1000 130 L1100 210 L950 250 L800 200 Z"/>
  </g>

  <!-- anomaly edge -->
  <line x1="1100" y1="210" x2="850" y2="90" stroke="#ef4444" stroke-width="3"/>

</svg>
