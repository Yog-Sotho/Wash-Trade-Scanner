<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" />

  <!-- Grid -->
  <g opacity="0.07" stroke="white">
    <path d="M0 60 H1200"/>
    <path d="M0 120 H1200"/>
    <path d="M0 180 H1200"/>
    <path d="M0 240 H1200"/>
    <path d="M200 0 V300"/>
    <path d="M400 0 V300"/>
    <path d="M600 0 V300"/>
    <path d="M800 0 V300"/>
    <path d="M1000 0 V300"/>
  </g>

  <!-- Data line -->
  <polyline points="100,200 250,140 400,180 550,110 700,160 850,120 1000,150"
            fill="none" stroke="url(#accent)" stroke-width="2"/>

  <!-- Nodes -->
  <g fill="#06b6d4">
    <circle cx="250" cy="140" r="3"/>
    <circle cx="400" cy="180" r="3"/>
    <circle cx="550" cy="110" r="3"/>
    <circle cx="700" cy="160" r="3"/>
    <circle cx="850" cy="120" r="3"/>
  </g>

  <!-- Title -->
  <text x="80" y="120" font-family="monospace" font-size="40" fill="#ffffff" font-weight="bold">
    Wash Trade Scanner
  </text>

  <!-- Subtitle -->
  <text x="80" y="160" font-family="monospace" font-size="18" fill="#9ca3af">
    Detect artificial volume and trading manipulation
  </text>

  <!-- Accent line -->
  <rect x="80" y="185" width="260" height="3" fill="url(#accent)" />

</svg>
