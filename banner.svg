<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">

  <!-- Background -->
  <rect width="1200" height="300" fill="#0a0f1c"/>

  <!-- LEFT SAFE ZONE (TEXT AREA BACKDROP) -->
  <rect x="0" y="0" width="700" height="300" fill="#0b1220"/>

  <!-- subtle grid only on right side -->
  <g stroke="#1f2937" stroke-width="1" opacity="0.4">
    <path d="M700 60 H1200"/>
    <path d="M700 120 H1200"/>
    <path d="M700 180 H1200"/>
    <path d="M700 240 H1200"/>

    <path d="M800 0 V300"/>
    <path d="M950 0 V300"/>
    <path d="M1100 0 V300"/>
  </g>

  <!-- TITLE -->
  <text x="60" y="110"
        fill="#ffffff"
        font-size="44"
        font-family="monospace"
        font-weight="700">
    Wash Trade Scanner
  </text>

  <!-- SUBTITLE -->
  <text x="60" y="155"
        fill="#9ca3af"
        font-size="18"
        font-family="monospace">
    Detecting artificial volume & coordinated trading loops
  </text>

  <text x="60" y="185"
        fill="#6b7280"
        font-size="14"
        font-family="monospace">
    Graph anomaly detection • wallet clustering • wash pattern identification
  </text>

  <!-- accent line -->
  <rect x="60" y="205" width="320" height="3" fill="#3b82f6"/>

  <!-- RIGHT GRAPH AREA -->
  <!-- nodes -->
  <g fill="#22d3ee">
    <circle cx="860" cy="90" r="6"/>
    <circle cx="1040" cy="110" r="6"/>
    <circle cx="1120" cy="200" r="6"/>
    <circle cx="980" cy="250" r="6"/>
    <circle cx="820" cy="220" r="6"/>
  </g>

  <!-- normal edges -->
  <g stroke="#3b82f6" stroke-width="2" fill="none">
    <path d="M860 90 L1040 110 L1120 200 L980 250 L820 220 L860 90"/>
  </g>

  <!-- wash trading loop highlight -->
  <path d="M1120 200 L860 90"
        stroke="#ef4444"
        stroke-width="4"
        fill="none"/>

  <!-- label -->
  <text x="820" y="285"
        fill="#ef4444"
        font-size="12"
        font-family="monospace">
    suspicious wash loop detected
  </text>

</svg>
