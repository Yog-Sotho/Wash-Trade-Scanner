name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * *'

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.1"

concurrency:
  group: \( {{ github.workflow }}- \){{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: verify commit signatures
        id: check
        run: |
          if [[ "${{ github.ref }}" == refs/heads/main ]]; then
            UNSIGNED=$(git log --format='%H' \( {{ github.event.before }}.. \){{ github.sha }} | while read c; do
              git verify-commit $c 2>/dev/null || echo $c
            done)
            if [ -n "$UNSIGNED" ]; then
              echo "unsigned commits: $UNSIGNED"
              exit 1
            fi
          fi
          echo "should_run=true" >> $GITHUB_OUTPUT

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified --fail
        continue-on-error: ${{ github.event.before == '0000000000000000000000000000000000000000' || github.event_name == 'schedule' }}

      - name: check forbidden files
        run: |
          for pattern in '\.env\( ' '\.pem \)' '\.key\( ' 'credentials' 'secret' 'password' '\.p12 \)' '\.pfx$'; do
            FOUND=$(git ls-files | grep -iE "$pattern" || true)
            if [ -n "$FOUND" ]; then
              echo "forbidden pattern: $pattern"
              echo "$FOUND"
              exit 1
            fi
          done

  dependency-audit:
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - run: poetry check --lock
      - run: poetry export -f requirements.txt --output requirements.txt --without-hashes

      - name: pip-audit scan
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --format=json --output=pip-audit.json
          CRITICAL=$(jq '[.dependencies[]?.vulns[]? | select(.fix_versions | length > 0)] | length' pip-audit.json)
          if [ "$CRITICAL" -gt 0 ]; then
            echo "$CRITICAL fixable vulnerabilities found"
            exit 1
          fi

      - name: safety scan
        run: |
          pip install safety
          safety scan --file requirements.txt --json --output safety.json

      - name: generate sbom
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --output-format json --output-file sbom.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-reports
          path: |
            pip-audit.json
            safety.json
            sbom.json
          retention-days: 90

  static-analysis:
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - run: poetry install --no-interaction

      - name: ruff
        run: |
          poetry run pip install ruff
          poetry run ruff check .
          poetry run ruff format --check .

      - name: mypy
        run: |
          poetry run pip install mypy
          poetry run mypy . --strict --ignore-missing-imports

      - name: bandit
        run: |
          poetry run pip install bandit
          poetry run bandit -r . -f json -o bandit.json || true

      - name: pylint
        run: |
          poetry run pip install pylint
          poetry run pylint . --output-format=json > pylint.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-analysis-reports
          path: |
            bandit.json
            pylint.json
          retention-days: 90

  test:
    needs: [dependency-audit, static-analysis]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - run: poetry install --no-interaction

      - name: run tests
        run: |
          poetry run pip install pytest pytest-asyncio pytest-cov hypothesis
          poetry run pytest tests/ \
            -v \
            --cov=core \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=80

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: true

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/\( {{ github.repository }}: \){{ github.sha }}
          format: sarif
          output: trivy-results.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - run: echo "deploy to staging"

  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: ${{ vars.APPROVERS }}
          minimum-approvals: 2

      - run: echo "deploy to production"
