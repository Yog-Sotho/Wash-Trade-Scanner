name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify commit signatures
        id: check
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # github.event.before is only meaningful on push events; guard against empty/zeroed values
            BEFORE="${{ github.event.before }}"
            if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              echo "Skipping signature check: no valid before-ref available"
            else
              UNSIGNED=$(git log --format='%H' "${BEFORE}..${{ github.sha }}" | while read -r c; do
                git verify-commit "$c" 2>/dev/null || echo "$c"
              done)
              if [ -n "$UNSIGNED" ]; then
                echo "unsigned commits: $UNSIGNED"
                exit 1
              fi
            fi
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified --fail
        continue-on-error: ${{ github.event.before == '0000000000000000000000000000000000000000' || github.event_name == 'schedule' }}

      - name: Check forbidden files
        run: |
          for pattern in '\.env$' '\.pem$' '\.key$' 'credentials' 'secret' 'password' '\.p12$' '\.pfx$'; do
            FOUND=$(git ls-files | grep -iE "$pattern" || true)
            if [ -n "$FOUND" ]; then
              echo "forbidden pattern matched: $pattern"
              echo "$FOUND"
              exit 1
            fi
          done

  dependency-audit:
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - run: poetry check --lock
      - run: poetry export -f requirements.txt --output requirements.txt --without-hashes

      - name: Install audit tools
        run: pip install pip-audit safety cyclonedx-bom

      - name: pip-audit scan
        run: |
          pip-audit --requirement requirements.txt --format=json --output=pip-audit.json
          CRITICAL=$(jq '[.dependencies[]?.vulns[]? | select(.fix_versions | length > 0)] | length' pip-audit.json)
          if [ "$CRITICAL" -gt 0 ]; then
            echo "$CRITICAL fixable vulnerabilities found"
            exit 1
          fi

      - name: safety scan
        run: |
          safety scan --file requirements.txt --json --output safety.json
          # Fail if Safety reports any vulnerabilities with known fixes (align with pip-audit behavior)
          FIXABLE=$(jq '[.vulnerabilities[]? | select(.vulnerability_id)] | length' safety.json || echo "0")
          if [ "$FIXABLE" -gt 0 ]; then
            echo "$FIXABLE vulnerabilities reported by safety"
            exit 1
          fi

      - name: Generate SBOM
        run: cyclonedx-py environment --output-format json --output-file sbom.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-reports
          path: |
            pip-audit.json
            safety.json
            sbom.json
          retention-days: 90

  static-analysis:
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - run: poetry install --no-interaction

      - name: Install linters
        run: |
          pip install ruff mypy bandit pylint

      - name: Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy
        run: mypy . --strict --ignore-missing-imports

      - name: Bandit
        run: bandit -r . -f json -o bandit.json || true

      - name: Pylint
        run: pylint . --output-format=json > pylint.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-analysis-reports
          path: |
            bandit.json
            pylint.json
          retention-days: 90

  test:
    needs: [dependency-audit, static-analysis]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - run: poetry install --no-interaction

      - name: Install test tools
        run: pip install pytest pytest-asyncio pytest-cov hypothesis

      - name: Run tests
        run: |
          pytest tests/ \
            -v \
            --cov=core \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=80

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: true

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging
      url: https://staging.example.com
    permissions:
      contents: read
    steps:
      - run: echo "Deploy to staging"

  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://example.com
    permissions:
      contents: read
    steps:
      - name: Await manual approval
        uses: trstringer/manual-approval@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ vars.APPROVERS }}
          minimum-approvals: 2

      - run: echo "Deploy to production"
