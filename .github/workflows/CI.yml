name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * *'

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # NOTE: this only *reports* unsigned/unverifiable commits; it cannot hard-fail
      # the pipeline because the runner has no trust anchor (no imported GPG keys for
      # authorized committers), so git verify-commit reports "No public key" for every
      # commit including genuinely signed ones. Wire up an allowed-signers keyring and
      # flip this to a hard gate once real trusted keys are provisioned.
      - name: report commit signature status
        id: check
        run: |
          if [[ "${{ github.ref }}" == refs/heads/main && -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            UNVERIFIED=$(git log --format='%H' "${{ github.event.before }}..${{ github.sha }}" | while read -r c; do
              git verify-commit "$c" >/dev/null 2>&1 || echo "$c"
            done)
            if [ -n "$UNVERIFIED" ]; then
              echo "::notice::Commits without a verifiable signature (no trusted key configured on this runner): $UNVERIFIED"
            fi
          fi
          echo "should_run=true" >> $GITHUB_OUTPUT

      # For pull_request events the checkout only fetches the PR ref, so a bare
      # branch name like "main" doesn't resolve locally; use the event's own
      # base/head SHAs instead (falls back to a full-history diff on push events,
      # where github.event.before is empty on a branch's first push).
      - uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f # v3.95.8
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --debug --only-verified

      - name: check forbidden files
        run: |
          for pattern in '\.env$' '\.pem$' '\.key$' 'credentials' 'secret' 'password' '\.p12$' '\.pfx$'; do
            FOUND=$(git ls-files | grep -iE "$pattern" || true)
            if [ -n "$FOUND" ]; then
              echo "forbidden pattern: $pattern"
              echo "$FOUND"
              exit 1
            fi
          done

  dependency-audit:
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: pip-audit scan
        run: |
          pip-audit --format=json --output=pip-audit.json || true

      # Note: `safety scan` (the current safety-cli command) requires an interactive
      # Safety Platform login/API key and cannot run unattended without one being
      # configured as a secret; pip-audit above already covers dependency CVE scanning
      # without that requirement, so we don't run safety here.

      - name: generate sbom
        run: |
          cyclonedx-py environment --output-format json --output-file sbom.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-reports
          path: |
            pip-audit.json
            sbom.json
          retention-days: 90

  static-analysis:
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff fix
        run: ruff check . --fix

      - name: ruff format
        run: ruff format .
        continue-on-error: true

      - name: auto-commit fixes
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix by ruff"
          file_pattern: "*.py"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: ruff check
        run: ruff check .

      - name: mypy type check
        run: mypy . --ignore-missing-imports || true

      - name: bandit security scan
        run: bandit -c pyproject.toml -r api core config models scripts -f json -o bandit.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-analysis-reports
          path: bandit.json
          retention-days: 90

  test:
    needs: [dependency-audit, static-analysis]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install project
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: run tests
        # Settings() is a required-field pydantic model instantiated at import time,
        # so merely collecting the test modules needs these present. Values are
        # test-only placeholders - nothing here talks to a real database or chain;
        # every test that touches Storage/web3 mocks them out.
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: "5432"
          DATABASE_NAME: wash_detector_test
          DATABASE_USER: test
          DATABASE_PASSWORD: test-password-not-a-secret
          DATABASE_SSL_MODE: disable
          ETH_RPC_URL: http://localhost:8545
        run: |
          pytest tests/ \
            -v \
            --cov=core \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=80

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker/OCI image references must be lowercase; github.repository preserves
      # the repo's actual case ("Yog-Sotho/Wash-Trade-Scanner"), so computing this
      # once here and reusing it (rather than lowercasing independently wherever
      # a tag is needed) keeps the built image and the trivy scan target in sync.
      - name: compute image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pinned to v0.35.0 by full commit SHA (not @master or a mutable tag) —
      # trivy-action tags <=0.34.2 were compromised in a March 2026 supply-chain
      # attack; 0.35.0 is the confirmed-safe, immutable-release-protected version.
      - name: trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
