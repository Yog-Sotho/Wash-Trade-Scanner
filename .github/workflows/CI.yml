name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * *'

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: verify commit signatures
        id: check
        run: |
          if [[ "${{ github.ref }}" == refs/heads/main ]]; then
            UNSIGNED=$(git log --format='%H' ${{ github.event.before }}..${{ github.sha }} | while read c; do
              git verify-commit $c 2>/dev/null || echo $c
            done)
            if [ -n "$UNSIGNED" ]; then
              echo "unsigned commits: $UNSIGNED"
              exit 1
            fi
          fi
          echo "should_run=true" >> $GITHUB_OUTPUT

      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified

      - name: check forbidden files
        run: |
          for pattern in '\.env$' '\.pem$' '\.key$' 'credentials' 'secret' 'password' '\.p12$' '\.pfx$'; do
            FOUND=$(git ls-files | grep -iE "$pattern" || true)
            if [ -n "$FOUND" ]; then
              echo "forbidden pattern: $pattern"
              echo "$FOUND"
              exit 1
            fi
          done

  dependency-audit:
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: install dependencies
        run: |
          pip install pip-audit safety

      - name: pip-audit scan
        run: |
          pip-audit --format=json --output=pip-audit.json || true

      - name: safety scan
        run: |
          safety scan --json --output safety.json || true

      - name: generate sbom
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --output-format json --output-file sbom.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-reports
          path: |
            pip-audit.json
            safety.json
            sbom.json
          retention-days: 90

  static-analysis:
    needs: pre-check
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: install dependencies
        run: |
          pip install ruff mypy bandit

      - name: ruff fix
        run: ruff check . --fix

      - name: ruff format
        run: ruff format .
        continue-on-error: true

      - name: auto-commit fixes
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix by ruff"
          file_pattern: "*.py"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: ruff check
        run: ruff check .

      - name: mypy type check
        run: mypy . --ignore-missing-imports || true

      - name: bandit security scan
        run: bandit -r . -f json -o bandit.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-analysis-reports
          path: |
            bandit.json
          retention-days: 30

  test:
    needs: static-analysis
    if: needs.pre-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install dependencies
        run: |
          pip install poetry pytest pytest-cov
          poetry install

      - name: run tests
        run: |
          poetry run pytest \
            --cov=./ \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=80

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

      - uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
