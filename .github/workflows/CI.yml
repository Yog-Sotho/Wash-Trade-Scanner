name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * *'

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.1"

concurrency:
  group: \( {{ github.workflow }}- \){{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: verify commit signatures
        id: check
        run: |
          if [[ "${{ github.ref }}" == refs/heads/main ]]; then
            UNSIGNED=$(git log --format='%H' \( {{ github.event.before }}.. \){{ github.sha }} | while read c; do
              git verify-commit $c 2>/dev/null || echo $c
            done)
            if [ -n "$UNSIGNED" ]; then
              echo "unsigned commits: $UNSIGNED"
              exit 1
            fi
          fi
          echo "should_run=true" >> $GITHUB_OUTPUT

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified --fail
        continue-on-error: ${{ github.event.before == '0000000000000000000000000000000000000000' || github.event_name == 'schedule' }}

      - name: check forbidden files
        run: |
          for pattern in '\.env\( ' '\.pem \)' '\.key\( ' 'credentials' 'secret' 'password' '\.p12 \)' '\.pfx$'; do
            FOUND=$(git ls-files | grep -iE "$pattern" || true)
            if [ -n "$FOUND" ]; then
              echo "forbidden pattern: $pattern"
              echo "$FOUND"
              exit 1
            fi
          done

  # ... (all other jobs exactly as in previous message - dependency-audit, static-analysis, test, build, deploy-staging, deploy-production)
