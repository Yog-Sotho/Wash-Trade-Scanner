services:
  postgres:
    image: postgres:15-alpine
    container_name: wash_detector_db
    environment:
      POSTGRES_USER: wash_user
      POSTGRES_PASSWORD: wash_pass
      POSTGRES_DB: wash_detector
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wash_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wash_detector_app
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: wash_detector
      DATABASE_USER: wash_user
      DATABASE_PASSWORD: wash_pass
      DATABASE_SSL_MODE: disable
      LOG_LEVEL: INFO
      ML_MODEL_PATH: /app/models/ml_model.pkl
      ETH_RPC_URL: ${ETH_RPC_URL:?ETH_RPC_URL must be set to a real RPC endpoint}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      BOT_ALLOWLIST: ${BOT_ALLOWLIST:-}
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    command: python scripts/run_audit.py --chain-id 1 --pool 0xB4e16d0168e52d35CaCD2c6185b44281Ec28C9Dc
    restart: unless-stopped

volumes:
  postgres_data:
